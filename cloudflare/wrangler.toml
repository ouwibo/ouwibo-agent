# ================================================================
# Ouwibo Agent — Cloudflare Worker
# Deployed at: agent.ouwibo.workers.dev
# Build source: cloudflare/ directory
#
# Bindings:
#   ASSETS      — Static CDN (HTML/CSS/JS served from Cloudflare edge)
#   CACHE       — KV Namespace (edge cache + rate limiter)
#   VERCEL_URL  — Backend origin
# ================================================================

name               = "agent"
main               = "worker.js"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

# ── Static Assets ─────────────────────────────────────────────
[assets]
directory = "../static"
binding   = "ASSETS"

# ── KV Namespace (Cache + Rate Limiter) ───────────────────────
[[kv_namespaces]]
binding = "CACHE"
id      = "ee8492298a67484f87cc4ef5c6a01f53"

# ── Environment Variables ─────────────────────────────────────
[vars]
VERCEL_URL      = "https://ouwibo-agent.vercel.app"
APP_NAME        = "Ouwibo Agent"
APP_ENV         = "production"
APP_VERSION     = "2026.1.0"
ALLOWED_ORIGINS = "*"
EDGE_CACHE_TTL  = "60"
RATE_LIMIT_RPM  = "60"

# ── Observability ─────────────────────────────────────────────
[observability]
enabled            = true
head_sampling_rate = 1

# ── Preview / staging ─────────────────────────────────────────
[env.preview]
name = "agent-preview"

[env.preview.vars]
VERCEL_URL     = "https://ouwibo-agent.vercel.app"
APP_ENV        = "preview"
EDGE_CACHE_TTL = "0"
RATE_LIMIT_RPM = "30"
