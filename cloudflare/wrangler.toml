# ============================================================
# Ouwibo Agent — Cloudflare Worker
# Deployed at: agent.ouwibo.workers.dev
# ============================================================

name                = "agent"
main                = "worker.js"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Environment variables ─────────────────────────────────────
# Set VERCEL_URL in Cloudflare dashboard:
#   Workers & Pages → agent → Settings → Variables and Secrets
[vars]
VERCEL_URL = "https://ouwibo-agent.vercel.app"

# ── Production ────────────────────────────────────────────────
[env.production]
name = "agent"

[env.production.vars]
VERCEL_URL = "https://ouwibo-agent.vercel.app"

# ── Preview / staging ─────────────────────────────────────────
[env.preview]
name = "agent-preview"

[env.preview.vars]
VERCEL_URL = "https://ouwibo-agent.vercel.app"

# ── Observability ─────────────────────────────────────────────
[observability]
enabled = true
