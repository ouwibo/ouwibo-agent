<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="virtual-protocol-site-verification" content="20edd410400b0f9d84c3e232dff9372f" />
  <title>Ouwibo Agent — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="shell" id="shell">

  <!-- Mobile backdrop -->
  <button type="button" class="shell-nav-backdrop" id="nav-backdrop" aria-label="Close sidebar"></button>

  <!-- ================================================================
       SIDEBAR
  ================================================================ -->
  <div class="shell-nav">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-shell">

        <!-- Brand -->
        <div class="sidebar-shell__header">
          <a href="/" class="sidebar-brand">
            <div class="sidebar-brand__logo-icon">
              <img src="icon.png" alt="Ouwibo Logo" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <span class="sidebar-brand__copy">
              <span class="sidebar-brand__eyebrow">Control</span>
              <span class="sidebar-brand__title">Ouwibo Agent</span>
            </span>
          </a>
          <button type="button" class="nav-collapse-toggle" id="nav-collapse-btn" title="Collapse sidebar" aria-label="Collapse sidebar">
            <span class="nav-collapse-toggle__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><line x1="4" x2="20" y1="6"  y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
            </span>
          </button>
        </div>

        <!-- Nav body -->
        <div class="sidebar-shell__body">
          <nav class="sidebar-nav">

            <!-- Chat Section -->
            <div class="nav-section">
              <div class="nav-section__items">
                <a href="/" class="nav-item nav-item--active" title="Chat">
                  <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  <span class="nav-item__text">Chat</span>
                </a>
                <a href="/search.html" class="nav-item" title="Search">
                  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <span class="nav-item__text">Search</span>
                </a>
              </div>
            </div>

            <!-- Agent Section -->
            <div class="nav-section">
              <div class="nav-section__label"><span>Agent</span></div>
              <div class="nav-section__items">
                <a href="/skills.html" class="nav-item" title="Skills">
                  <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                  <span class="nav-item__text">Skills</span>
                </a>
              </div>
            </div>

            <!-- Tools Section -->
            <div class="nav-section">
              <div class="nav-section__label"><span>Tools</span></div>
              <div class="nav-section__items">
                <a href="/tool.html?tool=wallet" class="nav-item" data-tool="wallet" title="Wallet Scan">
                  <svg viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
                  <span class="nav-item__text">Wallet Scan</span>
                </a>
                <a href="/tool.html?tool=crypto" class="nav-item" data-tool="crypto" title="Market">
                  <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                  <span class="nav-item__text">Market</span>
                </a>
                <a href="/tool.html?tool=dex" class="nav-item" data-tool="dex" title="DEX">
                  <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="3" y1="3" x2="9" y2="9"/></svg>
                  <span class="nav-item__text">DEX</span>
                </a>
              </div>
            </div>

          </nav>
        </div>

        <!-- Footer -->
        <div class="sidebar-shell__footer">
          <div class="sidebar-footer-content">
            <div class="social-icons">
              <a href="https://x.com/ouwibo" target="_blank" class="social-btn"><svg viewBox="0 0 24 24"><path d="M4 4l11.733 16h4.267l-11.733-16zM4 20l6.768-6.768m2.464-2.464L20 4"/></svg></a>
              <a href="https://t.me/ouwibo" target="_blank" class="social-btn"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg></a>
              <a href="https://github.com/ouwibo" target="_blank" class="social-btn"><svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A3.37 3.37 0 0 0 19 4.77a3.2 3.2 0 0 0-.1-2.37S17.5 2 14 4.42a11.28 11.28 0 0 0-6 0C4.5 2 3.1 2.37 3.1 2.37a3.2 3.2 0 0 0-.1 2.37 3.37 3.37 0 0 0-1.1 2.48c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 7.5 18.13V22"/></svg></a>
            </div>
            <div class="sidebar-version">
              <span id="status-dot" class="sidebar-version__status sidebar-connection-status--online"></span>
              <span class="sidebar-version__text">v2026.1.0</span>
            </div>
          </div>
        </div>

      </div>
    </aside>
  </div>

  <!-- ================================================================
       MAIN LAYOUT
  ================================================================ -->
  <div class="main-layout" style="flex: 1; display: flex; flex-direction: column; min-width: 0;">

    <header class="topbar">
      <div class="topnav-shell">
        <button type="button" class="topbar-nav-toggle" id="nav-toggle-mobile"><svg viewBox="0 0 24 24"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
        <div class="topnav-shell__content"></div>
        <div class="topnav-shell__actions">
          <button class="topbar-search" onclick="window.location.href='/search.html'"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span class="topbar-search__label">Search</span></button>
          <div class="topbar-theme-mode" id="theme-switcher">
            <button type="button" class="topbar-theme-mode__btn" data-theme-val="system"><svg viewBox="0 0 24 24"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41"/></svg></button>
            <button type="button" class="topbar-theme-mode__btn" data-theme-val="light"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/></svg></button>
            <button type="button" class="topbar-theme-mode__btn" data-theme-val="dark"><svg viewBox="0 0 24 24"><path d="M12 3a6.5 6.5 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <div class="chat-toolbar">
        <div class="chat-toolbar-left"><div class="model-badge"><span class="model-badge__dot"></span>AUTO · main</div></div>
        <div class="chat-toolbar-right">
          <button type="button" class="icon-btn" id="clear-chat-btn"><svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          <button class="icon-btn" id="expand-btn"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6"/></svg></button>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div class="message message--agent">
          <div class="message__avatar message__avatar--agent"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/></svg></div>
          <div class="message__body">
            <div class="message__bubble chat-prose">Ouwibo Agent is ready. How can I help you today?</div>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <div class="chat-input-box">
            <form id="chat-form" style="display: flex; width: 100%; align-items: flex-end; gap: 8px;">
              <textarea id="user-input" class="chat-input-textarea" placeholder="Message Ouwibo..." rows="1" style="flex: 1;"></textarea>
              <button type="submit" class="send-btn" id="send-btn" disabled><svg id="send-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg></button>
            </form>
          </div>
        </div>
      </div>
    </main>

  </div>

</div>

<!-- Auth Overlay -->
<div class="auth-overlay auth-overlay--hidden" id="auth-overlay">
  <div class="auth-modal">
    <div class="auth-modal__header"><h2>Access Required</h2></div>
    <div class="auth-modal__body">
      <div class="auth-error auth-error--hidden" id="auth-error"><span id="auth-error-text"></span></div>
      <input type="password" id="auth-token-input" class="auth-field__input" placeholder="Enter Token..." style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px;">
      <button type="button" class="auth-submit" id="auth-submit-btn" style="width: 100%;">Unlock</button>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="script.js"></script>
</body>
</html>
