<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Ouwibo Search</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#09090b',
                        accent: '#f43f5e',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-background text-zinc-100 antialiased; }
            ::-webkit-scrollbar       { @apply w-1; }
            ::-webkit-scrollbar-thumb { @apply bg-zinc-800 rounded-full; }
        }
        @layer components {
            .sidebar-link {
                @apply flex items-center gap-3 px-3 py-2.5 rounded-xl text-[13px]
                       font-medium transition-all duration-150 text-zinc-400
                       hover:bg-zinc-800/70 hover:text-zinc-100 cursor-pointer select-none w-full;
            }
            .sidebar-link.active { @apply bg-zinc-800/90 text-zinc-100; }
            .sidebar-label {
                @apply px-3 pt-5 pb-1.5 text-[10px] font-bold text-zinc-600
                       uppercase tracking-widest select-none;
            }
            .action-btn {
                @apply w-9 h-9 flex items-center justify-center rounded-xl
                       text-zinc-500 hover:bg-zinc-800 hover:text-zinc-200
                       transition-all duration-150 cursor-pointer shrink-0;
            }
            .filter-tab {
                @apply px-4 py-2.5 text-[13px] text-zinc-400 border-b-2 border-transparent
                       hover:text-zinc-200 transition-colors cursor-pointer whitespace-nowrap;
            }
            .filter-tab.active { @apply text-accent border-accent; }
        }
    </style>
</head>

<body class="flex h-screen w-screen overflow-hidden">

    <!-- Mobile backdrop -->
    <div
        id="sidebar-backdrop"
        class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm"
        aria-hidden="true"
    ></div>

    <!-- =====================================================================
         SIDEBAR
    ===================================================================== -->
    <aside
        id="sidebar"
        role="navigation"
        aria-label="Main navigation"
        class="fixed inset-y-0 left-0 z-50 w-72 flex flex-col
               bg-[#09090b] border-r border-zinc-800/70
               transform -translate-x-full transition-transform duration-300 ease-in-out
               md:relative md:translate-x-0 md:w-60 md:shrink-0"
    >
        <!-- Brand -->
        <div class="px-4 py-4 flex items-center justify-between border-b border-zinc-800/50 shrink-0">
            <a href="/" class="flex items-center gap-2.5 min-w-0">
                <div class="w-8 h-8 rounded-xl bg-accent/10 border border-accent/20
                            flex items-center justify-center shrink-0">
                    <i class="fa-solid fa-robot text-accent text-sm" aria-hidden="true"></i>
                </div>
                <div class="leading-tight min-w-0">
                    <div class="text-[13px] font-semibold text-zinc-100 truncate">Ouwibo Agent</div>
                    <div class="text-[9px] text-zinc-500 uppercase tracking-wider">AI Assistant</div>
                </div>
            </a>
            <button id="sidebar-close" aria-label="Close sidebar" class="action-btn md:hidden">
                <i class="fa-solid fa-xmark text-sm" aria-hidden="true"></i>
            </button>
        </div>

        <!-- Nav -->
        <div class="flex-1 overflow-y-auto px-2 py-3">
            <div class="sidebar-label">Menu</div>
            <a href="/" class="sidebar-link">
                <i class="fa-regular fa-message text-xs w-4 text-center" aria-hidden="true"></i>
                <span>Chat</span>
            </a>
            <a href="/search.html" class="sidebar-link active" aria-current="page">
                <i class="fa-solid fa-magnifying-glass text-xs w-4 text-center" aria-hidden="true"></i>
                <span>Search</span>
            </a>

            <div class="sidebar-label">Agent</div>
            <a href="/tools.html" class="sidebar-link">
                <i class="fa-solid fa-bolt text-xs w-4 text-center text-zinc-500" aria-hidden="true"></i>
                <span>Tools</span>
            </a>
            <a href="#" class="sidebar-link opacity-50 cursor-default pointer-events-none">
                <i class="fa-solid fa-robot text-xs w-4 text-center text-zinc-500" aria-hidden="true"></i>
                <span>Agents</span>
                <span class="ml-auto text-[9px] bg-zinc-800/80 text-zinc-600 px-1.5 py-0.5 rounded-md">Soon</span>
            </a>
            <a href="#" class="sidebar-link opacity-50 cursor-default pointer-events-none">
                <i class="fa-solid fa-circle-nodes text-xs w-4 text-center text-zinc-500" aria-hidden="true"></i>
                <span>Nodes</span>
                <span class="ml-auto text-[9px] bg-zinc-800/80 text-zinc-600 px-1.5 py-0.5 rounded-md">Soon</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="px-2 pb-4 pt-2 border-t border-zinc-800/50 space-y-2 shrink-0">
            <div id="lang-switcher"></div>

            <!-- Social media -->
            <div class="flex items-center justify-center gap-1 py-1">
                <a href="https://x.com/ouwibo" target="_blank" rel="noopener noreferrer"
                   title="@ouwibo on X"
                   class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-600
                          hover:text-zinc-300 hover:bg-zinc-800 transition-all">
                    <i class="fa-brands fa-x-twitter text-sm"></i>
                </a>
                <a href="https://t.me/ouwibo" target="_blank" rel="noopener noreferrer"
                   title="@ouwibo on Telegram"
                   class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-600
                          hover:text-zinc-300 hover:bg-zinc-800 transition-all">
                    <i class="fa-brands fa-telegram text-sm"></i>
                </a>
                <a href="https://github.com/ouwibo" target="_blank" rel="noopener noreferrer"
                   title="@ouwibo on GitHub"
                   class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-600
                          hover:text-zinc-300 hover:bg-zinc-800 transition-all">
                    <i class="fa-brands fa-github text-sm"></i>
                </a>
            </div>

            <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-zinc-900/40 border border-zinc-800/40">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shrink-0"></div>
                <span class="text-[11px] text-zinc-500 font-medium">System Active</span>
            </div>
        </div>
    </aside>

    <!-- =====================================================================
         MAIN
    ===================================================================== -->
    <main class="flex-1 flex flex-col overflow-hidden bg-[#0a0a0a] min-w-0" role="main">

        <!-- ── HOMEPAGE VIEW ───────────────────────────────────────────────── -->
        <div id="view-home" class="flex-1 flex flex-col overflow-y-auto">

            <!-- Mobile header -->
            <div class="flex items-center justify-between px-3 py-3 border-b border-zinc-800/50 md:hidden shrink-0">
                <button id="sidebar-toggle-home" aria-label="Menu" class="action-btn">
                    <i class="fa-solid fa-bars text-sm"></i>
                </button>
                <span class="text-[13px] font-semibold text-zinc-100">Ouwibo Search</span>
                <a href="/" class="action-btn" title="Chat">
                    <i class="fa-regular fa-message text-sm"></i>
                </a>
            </div>

            <!-- Centered content -->
            <div class="flex-1 flex flex-col items-center justify-center px-4 pb-10 pt-6">

                <!-- Colorful logo -->
                <div class="mb-8 md:mb-10 select-none" aria-label="Ouwibo">
                    <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#4285F4">O</span>
                    <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#EA4335">u</span>
                    <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#FBBC05">w</span>
                    <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#4285F4">i</span>
                    <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#34A853">b</span>
                    <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#EA4335">o</span>
                </div>

                <!-- Search form -->
                <form id="form-home" class="w-full max-w-xl" role="search">
                    <div class="flex items-center bg-zinc-900 border border-zinc-700 rounded-full
                                px-4 md:px-5 py-3 md:py-3.5 gap-3
                                hover:border-zinc-600 focus-within:border-zinc-500
                                focus-within:shadow-[0_0_0_3px_rgba(66,133,244,0.15)] transition-all">
                        <i class="fa-solid fa-magnifying-glass text-zinc-500 shrink-0" aria-hidden="true"></i>
                        <input
                            id="input-home"
                            type="search"
                            autocomplete="off"
                            spellcheck="false"
                            aria-label="Search"
                            placeholder="Search anything…"
                            class="flex-1 bg-transparent focus:outline-none text-[15px] text-zinc-100
                                   placeholder-zinc-500 min-w-0"
                        >
                        <button type="button" id="clear-home"
                            class="hidden text-zinc-500 hover:text-zinc-300 transition-colors shrink-0"
                            aria-label="Clear">
                            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                        </button>
                    </div>

                    <!-- Buttons -->
                    <div class="flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-3 mt-6">
                        <button type="submit"
                            class="w-full sm:w-auto px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700
                                   text-zinc-200 text-[13px] font-medium rounded-xl
                                   border border-zinc-700 transition-colors">
                            Ouwibo Search
                        </button>
                        <button type="button" id="lucky-btn"
                            class="w-full sm:w-auto px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700
                                   text-zinc-200 text-[13px] font-medium rounded-xl
                                   border border-zinc-700 transition-colors">
                            I'm Feeling Lucky
                        </button>
                    </div>
                </form>

                <!-- Quick links -->
                <div class="flex items-center gap-3 mt-8 text-[12px] text-zinc-600 flex-wrap justify-center">
                    <a href="/" class="hover:text-zinc-400 transition-colors flex items-center gap-1.5">
                        <i class="fa-regular fa-message" aria-hidden="true"></i>
                        <span>Chat</span>
                    </a>
                    <span>·</span>
                    <span id="lang-hint-home"></span>
                </div>
            </div>
        </div>

        <!-- ── RESULTS VIEW ────────────────────────────────────────────────── -->
        <div id="view-results" class="hidden flex-col flex-1 overflow-hidden">

            <!-- Results top bar -->
            <div class="flex items-center gap-2 md:gap-4 px-3 md:px-4 py-2.5 border-b border-zinc-800/50 shrink-0" style="min-height:56px">

                <!-- Hamburger (mobile) -->
                <button id="sidebar-toggle-results" aria-label="Menu" class="action-btn md:hidden">
                    <i class="fa-solid fa-bars text-sm"></i>
                </button>

                <!-- Small logo (desktop) -->
                <a href="/search.html" aria-label="Ouwibo Search" class="shrink-0 select-none hidden md:block">
                    <span class="text-2xl font-bold" style="color:#4285F4">O</span>
                    <span class="text-2xl font-bold" style="color:#EA4335">u</span>
                    <span class="text-2xl font-bold" style="color:#FBBC05">w</span>
                    <span class="text-2xl font-bold" style="color:#4285F4">i</span>
                    <span class="text-2xl font-bold" style="color:#34A853">b</span>
                    <span class="text-2xl font-bold" style="color:#EA4335">o</span>
                </a>

                <!-- Search bar -->
                <form id="form-results" class="flex-1 min-w-0" role="search">
                    <div class="flex items-center bg-zinc-900 border border-zinc-700 rounded-full
                                px-3 md:px-4 py-2 md:py-2.5 gap-2 md:gap-3
                                hover:border-zinc-600 focus-within:border-zinc-500
                                focus-within:shadow-[0_0_0_3px_rgba(66,133,244,0.15)] transition-all">
                        <i class="fa-solid fa-magnifying-glass text-zinc-500 text-sm shrink-0" aria-hidden="true"></i>
                        <input
                            id="input-results"
                            type="search"
                            autocomplete="off"
                            spellcheck="false"
                            placeholder="Search anything…"
                            aria-label="Search"
                            class="flex-1 bg-transparent focus:outline-none text-[14px] text-zinc-100
                                   placeholder-zinc-500 min-w-0"
                        >
                        <button type="button" id="clear-results"
                            class="hidden text-zinc-500 hover:text-zinc-300 transition-colors shrink-0"
                            aria-label="Clear">
                            <i class="fa-solid fa-xmark text-sm" aria-hidden="true"></i>
                        </button>
                        <button type="submit" aria-label="Search"
                            class="text-zinc-400 hover:text-zinc-200 transition-colors shrink-0">
                            <i class="fa-solid fa-arrow-right text-sm" aria-hidden="true"></i>
                        </button>
                    </div>
                </form>

                <!-- Back to chat (desktop) -->
                <a href="/"
                   class="hidden md:flex items-center gap-1.5 text-[12px] text-zinc-500
                          hover:text-zinc-300 transition-colors shrink-0">
                    <i class="fa-regular fa-message text-[11px]" aria-hidden="true"></i>
                    <span>Chat</span>
                </a>
            </div>

            <!-- Filter tabs -->
            <div class="flex items-center border-b border-zinc-800/40 shrink-0 overflow-x-auto px-3 md:px-4 gap-1">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="news">News</button>
                <button class="filter-tab" data-filter="images">Images</button>
                <button class="filter-tab" data-filter="videos">Videos</button>
            </div>

            <!-- Scrollable results body -->
            <div id="results-body" class="flex-1 overflow-y-auto">
                <div class="max-w-2xl mx-auto px-3 md:px-4 py-4 md:py-6">

                    <!-- Stats -->
                    <p id="results-stats" class="text-[12px] md:text-[13px] text-zinc-500 mb-4 md:mb-5" aria-live="polite"></p>

                    <!-- Loading skeleton -->
                    <div id="results-loading" class="hidden space-y-6 md:space-y-8">
                        <div class="animate-pulse space-y-2">
                            <div class="h-3 bg-zinc-800 rounded w-36"></div>
                            <div class="h-5 bg-zinc-800 rounded w-3/4"></div>
                            <div class="h-3 bg-zinc-800 rounded w-full"></div>
                            <div class="h-3 bg-zinc-800 rounded w-5/6"></div>
                        </div>
                        <div class="animate-pulse space-y-2">
                            <div class="h-3 bg-zinc-800 rounded w-28"></div>
                            <div class="h-5 bg-zinc-800 rounded w-2/3"></div>
                            <div class="h-3 bg-zinc-800 rounded w-full"></div>
                            <div class="h-3 bg-zinc-800 rounded w-4/5"></div>
                        </div>
                        <div class="animate-pulse space-y-2">
                            <div class="h-3 bg-zinc-800 rounded w-44"></div>
                            <div class="h-5 bg-zinc-800 rounded w-3/5"></div>
                            <div class="h-3 bg-zinc-800 rounded w-full"></div>
                            <div class="h-3 bg-zinc-800 rounded w-3/4"></div>
                        </div>
                    </div>

                    <!-- Error state -->
                    <div id="results-error" class="hidden py-6">
                        <div class="flex flex-col items-start gap-3">
                            <div class="w-11 h-11 rounded-full bg-red-950/50 border border-red-900/50
                                        flex items-center justify-center">
                                <i class="fa-solid fa-triangle-exclamation text-red-500 text-sm" aria-hidden="true"></i>
                            </div>
                            <p id="results-error-text" class="text-[14px] text-zinc-400"></p>
                            <button id="retry-btn"
                                class="px-4 py-2 text-[13px] bg-zinc-800 hover:bg-zinc-700
                                       border border-zinc-700 rounded-xl transition-colors">
                                Try again
                            </button>
                        </div>
                    </div>

                    <!-- Empty state -->
                    <div id="results-empty" class="hidden py-10 text-center">
                        <i class="fa-solid fa-face-frown text-4xl text-zinc-700 mb-4 block" aria-hidden="true"></i>
                        <p id="results-empty-text" class="text-[14px] text-zinc-500"></p>
                    </div>

                    <!-- Results list -->
                    <div id="results-list" role="list" aria-label="Search results" class="divide-y divide-zinc-800/50"></div>

                    <!-- Load more -->
                    <div id="load-more-area" class="hidden flex justify-center pt-6 pb-10">
                        <button id="load-more-btn"
                            class="flex items-center gap-2 px-6 py-2.5 text-[13px] text-zinc-300
                                   bg-zinc-900 hover:bg-zinc-800 border border-zinc-700
                                   rounded-full transition-colors">
                            <i class="fa-solid fa-plus text-[11px]" aria-hidden="true"></i>
                            <span>Load more</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <script src="i18n.js"></script>
    <script src="search.js"></script>

    <script>
        // Sidebar responsive logic (shared with index)
        const sidebar       = document.getElementById('sidebar');
        const backdrop      = document.getElementById('sidebar-backdrop');
        const closeBtns     = [
            document.getElementById('sidebar-close'),
        ];
        const openBtns      = [
            document.getElementById('sidebar-toggle-home'),
            document.getElementById('sidebar-toggle-results'),
        ];

        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            sidebar.classList.add('translate-x-0');
            backdrop.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            sidebar.classList.remove('translate-x-0');
            backdrop.classList.add('hidden');
            document.body.style.overflow = '';
        }

        openBtns.forEach(btn => btn && btn.addEventListener('click', openSidebar));
        closeBtns.forEach(btn => btn && btn.addEventListener('click', closeSidebar));
        backdrop.addEventListener('click', closeSidebar);

        // Close sidebar on md+ screens when resizing
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) closeSidebar();
        });

        // Language switcher
        if (window.i18n) {
            window.i18n.buildSwitcher('lang-switcher');
            const langHintHome = document.getElementById('lang-hint-home');
            if (langHintHome) {
                const lang  = window.i18n.getLang();
                const langs = window.i18n.getLanguages();
                if (langs[lang]) langHintHome.textContent = langs[lang].flag + ' ' + langs[lang].name;
            }
        }
    </script>
</body>
</html>
