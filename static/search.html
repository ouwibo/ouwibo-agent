<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="virtual-protocol-site-verification" content="20edd410400b0f9d84c3e232dff9372f" />
  <title>Ouwibo Agent — Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="style.css?v=20260316">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<div class="shell" id="shell">

  <!-- Mobile backdrop -->
  <button type="button" class="shell-nav-backdrop" id="nav-backdrop" aria-label="Close sidebar"></button>

  <!-- ================================================================
       SIDEBAR
  ================================================================ -->
  <div class="shell-nav">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-shell">

        <!-- Brand -->
        <div class="sidebar-shell__header">
          <a href="/" class="sidebar-brand">
            <div class="sidebar-brand__logo-icon">
              <img src="icon.png" alt="Ouwibo Logo" style="width:100%;height:100%;object-fit:contain;">
            </div>
            <span class="sidebar-brand__title">Ouwibo Agent</span>
          </a>
        </div>

        <!-- Nav body -->
        <div class="sidebar-shell__body">
          <nav class="sidebar-nav">
            <a href="/" class="nav-item" title="Chat">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
              <span class="nav-item__text">Chat</span>
            </a>
            <a href="/search.html" class="nav-item nav-item--active" title="Search">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
              <span class="nav-item__text">Search</span>
            </a>
            <a href="/skills.html" class="nav-item" title="Skills">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
              <span class="nav-item__text">Skills</span>
            </a>
            <a href="/tools.html" class="nav-item" title="Tools">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.7-3.7a1 1 0 0 0 0-1.4l-1.6-1.6a1 1 0 0 0-1.4 0l-3.7 3.7Z"/><path d="m3.3 15.7 3.7-3.7a1 1 0 0 1 1.4 0l1.6 1.6a1 1 0 0 1 0 1.4l-3.7 3.7a1 1 0 0 1-1.4 0l-1.6-1.6a1 1 0 0 1 0-1.4Z"/><path d="m14 14 3 3"/><path d="m10 10 3 3"/></svg></span>
              <span class="nav-item__text">Tools</span>
            </a>
          </nav>
        </div>

        <!-- Footer -->
        <div class="sidebar-shell__footer">
          <div class="sidebar-footer-content">
            <div class="social-icons">
              <a href="https://x.com/ouwibo" target="_blank" rel="noopener noreferrer" class="social-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              </a>
              <a href="https://t.me/ouwibo" target="_blank" rel="noopener noreferrer" class="social-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
              </a>
            </div>
            <div id="status-dot" class="sidebar-version__status sidebar-connection-status--online"></div>
          </div>
        </div>

      </div>
    </aside>
  </div>

  <!-- ================================================================
       MAIN CONTENT — SEARCH
  ================================================================ -->
  <div class="main-layout">

    <header class="topbar">
      <div class="topnav-shell">
        <button type="button" class="topbar-nav-toggle" id="nav-toggle-mobile" aria-label="Open sidebar">
          <span class="nav-collapse-toggle__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><line x1="4" x2="20" y1="6"  y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          </span>
        </button>
        <div class="topnav-shell__content"></div>
        <div class="topnav-shell__actions">
          <button class="topbar-search" onclick="window.location.href='/search.html'" title="Search (⌘K)" aria-label="Open search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span class="topbar-search__label">Search</span>
            <kbd class="topbar-search__kbd">⌘K</kbd>
          </button>
          <button type="button" class="topbar-auth-badge" id="topbar-auth-badge" title="Authentication status" aria-label="Authentication status" style="display:none">
            <svg id="topbar-auth-icon-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <svg id="topbar-auth-icon-unlock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
            <span id="topbar-auth-label">Locked</span>
          </button>
          <div class="topbar-status">
            <div class="topbar-theme-mode" role="group" aria-label="Color mode" id="theme-switcher">
              <button type="button" class="topbar-theme-mode__btn topbar-theme-mode__btn--active" data-theme-val="system" title="Auto" aria-label="Auto theme">
                <svg viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
              </button>
              <button type="button" class="topbar-theme-mode__btn" data-theme-val="light" title="Light" aria-label="Light theme">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
              </button>
              <button type="button" class="topbar-theme-mode__btn" data-theme-val="dark" title="Dark" aria-label="Dark theme">
                <svg viewBox="0 0 24 24"><path d="M12 3a6.5 6.5 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
              </button>
            </div>
            <span id="lang-hint" style="display:none"></span>
            <div id="lang-switcher" style="display:none"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="content search-page">

    <!-- ── HOMEPAGE VIEW ───────────────────────────────────────────────── -->
    <div id="view-home" class="flex-1 flex flex-col overflow-y-auto bg-transparent">
      <!-- Centered content -->
      <div class="flex-1 flex flex-col items-center justify-center px-4 pb-10 pt-6">

        <!-- Colorful logo -->
        <div class="mb-8 md:mb-10 select-none" aria-label="Ouwibo">
          <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#4285F4">O</span>
          <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#EA4335">u</span>
          <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#FBBC05">w</span>
          <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#4285F4">i</span>
          <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#34A853">b</span>
          <span class="text-5xl md:text-7xl font-bold tracking-tight" style="color:#EA4335">o</span>
        </div>

        <!-- Search form -->
        <form id="form-home" class="w-full max-w-xl" role="search">
          <div class="flex items-center bg-[var(--bg-2)] border border-[var(--border)] rounded-full
                      px-4 md:px-5 py-3 md:py-3.5 gap-3
                      hover:border-[var(--border-2)] focus-within:border-[var(--accent)]
                      focus-within:shadow-[0_0_0_3px_var(--accent-subtle)] transition-all">
            <svg class="text-[var(--text-3)]" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input
              id="input-home"
              type="search"
              autocomplete="off"
              spellcheck="false"
              aria-label="Search"
              placeholder="Search anything…"
              class="flex-1 bg-transparent focus:outline-none text-[15px] text-[var(--text-1)]
                     placeholder-[var(--text-3)] min-w-0"
            >
            <button type="button" id="clear-home"
              class="hidden text-[var(--text-3)] hover:text-[var(--text-1)] transition-colors shrink-0"
              aria-label="Clear">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <!-- Buttons -->
          <div class="flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-3 mt-6">
            <button type="submit"
              class="w-full sm:w-auto px-5 py-2.5 bg-[var(--bg-3)] hover:bg-[var(--bg-2)]
                     text-[var(--text-2)] text-[13px] font-medium rounded-xl
                     border border-[var(--border)] transition-colors">
              Ouwibo Search
            </button>
            <button type="button" id="lucky-btn"
              class="w-full sm:w-auto px-5 py-2.5 bg-[var(--bg-3)] hover:bg-[var(--bg-2)]
                     text-[var(--text-2)] text-[13px] font-medium rounded-xl
                     border border-[var(--border)] transition-colors">
              I'm Feeling Lucky
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── RESULTS VIEW ────────────────────────────────────────────────── -->
    <div id="view-results" class="hidden flex-col flex-1 overflow-hidden bg-transparent">
      <!-- Results search bar -->
      <div class="shrink-0 px-3 md:px-4 pt-3">
        <form id="form-results" class="w-full max-w-2xl mx-auto" role="search">
          <div class="flex items-center bg-[var(--bg-2)] border border-[var(--border)] rounded-full
                      px-4 md:px-5 py-2.5 gap-3
                      hover:border-[var(--border-2)] focus-within:border-[var(--accent)]
                      focus-within:shadow-[0_0_0_3px_var(--accent-subtle)] transition-all">
            <svg class="text-[var(--text-3)]" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input
              id="input-results"
              type="search"
              autocomplete="off"
              spellcheck="false"
              aria-label="Search"
              placeholder="Search anything…"
              class="flex-1 bg-transparent focus:outline-none text-[15px] text-[var(--text-1)]
                     placeholder-[var(--text-3)] min-w-0"
            >
            <button type="button" id="clear-results"
              class="hidden text-[var(--text-3)] hover:text-[var(--text-1)] transition-colors shrink-0"
              aria-label="Clear">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <button type="submit"
              class="shrink-0 h-9 px-4 rounded-full bg-[var(--accent)] text-white text-[13px] font-semibold
                     hover:brightness-95 transition-all">
              Search
            </button>
          </div>
        </form>
      </div>

      <!-- Filter tabs -->
      <div class="flex items-center border-b border-[var(--border)] shrink-0 overflow-x-auto px-3 md:px-4 gap-1">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="news">News</button>
        <button class="filter-tab" data-filter="images">Images</button>
        <button class="filter-tab" data-filter="videos">Videos</button>
      </div>

      <!-- Scrollable results body -->
      <div id="results-body" class="flex-1 overflow-y-auto">
        <div class="max-w-2xl mx-auto px-3 md:px-4 py-4 md:py-6">
          <p id="results-stats" class="text-[12px] md:text-[13px] text-[var(--text-3)] mb-4 md:mb-5" aria-live="polite"></p>
          <div id="results-loading" class="hidden space-y-6 md:space-y-8">
            <!-- Skeletons... -->
          </div>
          <div id="results-error" class="hidden py-6">
            <div class="bg-[var(--bg-2)] border border-[var(--border)] rounded-2xl p-5">
              <div class="text-[13px] text-[var(--text-2)] font-semibold">Search error</div>
              <div id="results-error-text" class="mt-1 text-[13px] text-[var(--text-3)]"></div>
              <div class="mt-4">
                <button id="retry-btn" type="button" class="btn btn--sm">Try again</button>
              </div>
            </div>
          </div>
          <div id="results-empty" class="hidden py-10 text-center">
            <p id="results-empty-text" class="text-[14px] text-[var(--text-3)]"></p>
          </div>
          <div id="results-list" role="list" aria-label="Search results" class="divide-y divide-[var(--border)]"></div>
          <div id="load-more-area" class="hidden flex justify-center pt-6 pb-10">
            <button id="load-more-btn" class="btn btn--sm">Load more</button>
          </div>
        </div>
      </div>
    </div>

  </main>

</div>
</div>




<script src="i18n.js?v=20260316"></script>
<script src="script.js?v=20260316"></script>
<script src="search.js?v=20260316"></script>
</body>
</html>
