services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8001 --reload

  acp-node:
    build:
      context: ./virtuals-protocol-acp
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./virtuals-protocol-acp:/app
    command: npm run dev
    depends_on:
      - backend
